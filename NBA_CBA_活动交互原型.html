
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA&CBA活动原型</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f6fa;margin:0}
.header{background:#1e3a8a;color:#fff;padding:28px;text-align:center}
.container{width:900px;margin:24px auto}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.info{display:flex;gap:30px}
.info div{flex:1}
.metric{font-size:28px;font-weight:bold;color:#e11d48}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:12px 28px;font-size:16px;cursor:pointer}
button:disabled{background:#bbb;cursor:not-allowed}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#f1f5f9}
.rule{line-height:1.8}
</style>
</head>
<body>
<div class="header">
<h1>26-27赛季 NBA & CBA</h1>
<p>篮球激战正酣，最高日领2,888元</p>
</div>

<div class="container">

<div class="card info">
<div>
<p>今日累计负盈利</p>
<div class="metric" id="loss">0 元</div>
</div>

<div>
<p>当前可领取</p>
<div class="metric" id="bonus">0 元</div>
</div>

<div style="display:flex;align-items:center;justify-content:center">
<button id="apply" disabled onclick="apply()">立即申请</button>
</div>
</div>

<div class="card">
<h3>模拟数据</h3>
<input id="inputLoss" type="number" value="0" style="padding:8px;width:180px">
<button onclick="calc()">计算奖励</button>
<p style="color:#666">（演示交互：输入今日累计负盈利金额即可计算奖励）</p>
</div>

<div class="card">
<h3>奖励档位</h3>
<table>
<tr><th>累计负盈利(元)</th><th>助力金(元)</th></tr>
<tr><td>≥500</td><td>8</td></tr>
<tr><td>≥1,000</td><td>18</td></tr>
<tr><td>≥3,000</td><td>58</td></tr>
<tr><td>≥8,000</td><td>168</td></tr>
<tr><td>≥15,000</td><td>288</td></tr>
<tr><td>≥30,000</td><td>888</td></tr>
<tr><td>≥80,000</td><td>2,888</td></tr>
</table>
</div>

<div class="card rule">
<h3>活动规则（节选）</h3>
<ol>
<li>每日00:00-23:59可申请一次。</li>
<li>奖励次日18:00前人工派发。</li>
<li>彩金需完成3倍体育流水。</li>
<li>仅统计NBA、CBA已结算有效注单。</li>
</ol>
</div>

</div>

<script>
function reward(loss){
 if(loss>=80000) return 2888;
 if(loss>=30000) return 888;
 if(loss>=15000) return 288;
 if(loss>=8000) return 168;
 if(loss>=3000) return 58;
 if(loss>=1000) return 18;
 if(loss>=500) return 8;
 return 0;
}
function calc(){
 let v=Number(document.getElementById('inputLoss').value)||0;
 let r=reward(v);
 document.getElementById('loss').innerText=v.toLocaleString()+" 元";
 document.getElementById('bonus').innerText=r.toLocaleString()+" 元";
 document.getElementById('apply').disabled=(r===0);
}
function apply(){
 alert("演示：申请成功！\n实际项目进入人工审核流程。");
}
calc();
</script>
</body>
</html>
