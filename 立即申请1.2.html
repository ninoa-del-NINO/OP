<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>立即申请按钮交互原型</title>
<style>
body{font-family:Arial,"Microsoft YaHei";background:#f5f5f5;margin:0}
.wrap{width:900px;margin:40px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
.toolbar{margin-bottom:20px}
button{cursor:pointer}
#scene{padding:6px 10px}
#apply{background:#7b57ff;color:#fff;border:none;padding:12px 32px;border-radius:24px;font-size:16px}
#apply:disabled{background:#bbb}
.mask{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.45);align-items:center;justify-content:center}
.dialog{background:#fff;border-radius:12px;padding:24px;width:320px;text-align:center}
.ok{margin-top:16px;background:#7b57ff;color:#fff;border:none;padding:10px 28px;border-radius:20px}
</style>
</head>
<body>
<div class="wrap">
<h2>立即申请按钮交互（Web原型）</h2>

<div class="toolbar">
首次点击场景：
<select id="scene">
<option value="success">领取成功</option>
<option value="notstart">活动尚未开始</option>
</select>
</div>

<button id="apply">立即申请</button>

<p style="margin-top:20px;color:#666">
逻辑：<br>
① 第一次点击：根据场景提示【领取成功】或【活动尚未开始】。<br>
② 第二次点击：成功场景提示【已申请成功，请勿重复申请】；未开始场景提示【活动尚未开始】。
</p>
</div>

<div class="mask" id="mask">
<div class="dialog">
<h2 id="title"></h2>
<p id="msg"></p>
<button class="ok" onclick="closeDlg()">知道了</button>
</div>
</div>

<script>
let clickCount=0;
const btn=document.getElementById("apply");

btn.onclick=function(){
    clickCount++;
    const scene=document.getElementById("scene").value;

    btn.disabled=true;
    btn.innerText="申请中...";

    setTimeout(()=>{
        btn.disabled=false;

        if(clickCount===1){
            if(scene==="success"){
                show("领取成功","恭喜您，活动申请成功。");
                btn.innerText="立即申请";
            }else{
                show("活动尚未开始","活动开始后即可申请。");
                btn.innerText="立即申请";
            }
        }else{
            if(scene==="success"){
                show("已申请成功","请勿重复申请。");
            }else{
                show("活动尚未开始","活动开始后即可申请。");
            }
            btn.innerText="立即申请";
        }
    },800);
}

function show(t,m){
 document.getElementById("title").innerText=t;
 document.getElementById("msg").innerText=m;
 document.getElementById("mask").style.display="flex";
}
function closeDlg(){
 document.getElementById("mask").style.display="none";
}
</script>
</body>
</html>
