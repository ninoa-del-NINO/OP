
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>派奖策略配置 Prototype V18</title>
<style>
body{font:8px Arial,"Microsoft YaHei";margin:0;background:#fff}
.wrap{width:860px;margin:0 auto;padding:4px}
.tabs{display:flex;gap:6px;margin-bottom:6px}
.tab,.btn{font-size:8px;border:1px solid #8CA1C1;background:#fff;padding:3px 8px;border-radius:3px;cursor:pointer}
.tab.active,.btn.primary{background:#8CA1C1;color:#fff}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px;font-size:8px}
.tag{display:inline-block;border:1px solid #ccd6ff;padding:1px 5px;margin-right:3px}
.del{color:#0000FF;cursor:pointer;margin-left:8px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);align-items:center;justify-content:center}
.box{background:#fff;border:1px solid #ccc;padding:12px;width:260px}
.box h3{margin:0 0 8px;font-size:10px}
.box input,.box select{width:100%;font-size:8px;padding:4px}
.actions{text-align:right;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
<div id="tabs" class="tabs"></div>
<table><thead><tr><th width="220" style="background:#8CA1C1;color:#FFF;">全部体育场馆</th><th style="background:#8CA1C1;color:#FFF;">联赛ID（最多10个）</th><th width="70" style="background:#8CA1C1;color:#FFF;">操作</th></tr></thead><tbody id="tb"></tbody></table>


<div style="margin-top:8px;font-size:8px;border-top:1px solid #ddd;padding-top:6px">
<div style="margin-bottom:6px;">活动存款条件：
<label><input type="radio" name="deposit"> 是</label>
日累计存款≥ <input style="width:60px;font-size:8px;">
<label style="margin-left:20px;"><input type="radio" name="deposit" checked> 否</label>
</div>

<div style="margin-bottom:4px;">日有效投注派奖配置：</div>
<table style="width:100%;border-collapse:collapse">
<tr><th style="background:#8CA1C1;color:#FFF;">日有效投注</th><th style="background:#8CA1C1;color:#FFF;">彩金（元）</th><th style="background:#8CA1C1;color:#FFF;">流水倍数</th><th style="background:#8CA1C1;color:#FFF;">操作</th></tr>
<tr><td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td style="text-align:center"><span class="del">删除</span></td></tr>
</table>
<div style="text-align:right;margin-top:4px;margin-bottom:8px"><button class="btn primary" id="addBetRule">新增</button></div>

<div style="margin-bottom:4px;">日负盈利派奖配置：</div>
<table style="width:100%;border-collapse:collapse">
<tr><th style="background:#8CA1C1;color:#FFF;">日负盈利</th><th style="background:#8CA1C1;color:#FFF;">彩金（元）</th><th style="background:#8CA1C1;color:#FFF;">流水倍数</th><th style="background:#8CA1C1;color:#FFF;">操作</th></tr>
<tr><td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td style="text-align:center"><span class="del">删除</span></td></tr>
</table>
<div style="text-align:right;margin-top:4px"><button class="btn primary" id="addLossRule">新增</button></div>

</div>
<div style="text-align:right;margin-top:6px"><button class="btn primary">保存</button></div>

</div>

<div class="modal" id="strategyModal"><div class="box">
<h3 id="strategyTitle">新增策略</h3>
<input id="strategyName">
<div class="actions"><button class="btn" onclick="hide('strategyModal')">取消</button><button class="btn primary" onclick="saveStrategy()">确定</button></div>
</div></div>

<div class="modal" id="venueModal"><div class="box">
<h3>选择体育场馆</h3>
<select id="venueSelect"><option>CMD体育</option><option>IM体育</option><option>沙巴体育</option><option>PM体育</option><option>BTI体育</option></select>
<div class="actions"><button class="btn" onclick="hide('venueModal')">取消</button><button class="btn primary" onclick="saveVenue()">确定</button></div>
</div></div>

<div class="modal" id="idModal"><div class="box">
<h3>添加联赛ID</h3>
<input id="leagueId">
<div class="actions"><button class="btn" onclick="hide('idModal')">取消</button><button class="btn primary" onclick="saveLeague()">确定</button></div>
</div></div>

<div class="modal" id="confirmModal"><div class="box">
<h3>确认操作</h3>
<div id="confirmText">确认删除？</div>
<div class="actions"><button class="btn" onclick="hide('confirmModal')">取消</button><button class="btn primary" onclick="confirmAction()">确定</button></div>
</div></div>

<script>
const venues=["沙巴体育","PM体育","BTI体育"];
let list=[{name:"策略1",data:{"沙巴体育":["1001"],"PM体育":["2001"],"BTI体育":[]}}];
let cur=0,edit=-1,currentVenue="",pending=null;
function show(id){document.getElementById(id).style.display="flex";}
function hide(id){document.getElementById(id).style.display="none";}
function render(){
tabs.innerHTML="";
list.forEach((s,i)=>tabs.innerHTML+=`<span class="tab ${i==cur?'active':''}" onclick="cur=${i};render()">${s.name}</span>`);
tabs.innerHTML+=`<button class="btn primary" onclick="newStrategy()">+新增策略</button><button class="btn" onclick="renameStrategy()">编辑</button><button class="btn" onclick="askDeleteStrategy()">删除</button>`;
tb.innerHTML="";
venues.forEach(v=>{
let tags=(list[cur].data[v]||[]).map((x,n)=>`<span class='tag'>${x} ×</span>`).join("");
tb.innerHTML+=`<tr><td>${v}</td><td>${tags}<button class='btn primary' onclick="currentVenue='${v}';show('idModal')">添加</button></td><td style="text-align:center"><span class='del' onclick="askDeleteVenue('${v}')">删除</span></td></tr>`;
});
}
function newStrategy(){edit=-1;strategyTitle.innerText="新增策略";strategyName.value="";show('strategyModal')}
function renameStrategy(){edit=cur;strategyTitle.innerText="编辑策略";strategyName.value=list[cur].name;show('strategyModal')}
function saveStrategy(){let n=strategyName.value.trim();if(!n)return;if(edit==-1){let d={};venues.forEach(v=>d[v]=[]);list.push({name:n,data:d});cur=list.length-1;}else list[cur].name=n;hide('strategyModal');render();}
function showVenueModal(){show('venueModal')}
function saveVenue(){let n=venueSelect.value;if(!venues.includes(n)){venues.push(n);list.forEach(s=>s.data[n]=[]);}hide('venueModal');render();}
function saveLeague(){let id=leagueId.value.trim();if(!/^\d+$/.test(id))return alert('请输入数字');let a=list[cur].data[currentVenue];if(a.length<10&&!a.includes(id))a.push(id);hide('idModal');render();}
function askDeleteStrategy(){confirmText.innerText="确认删除当前策略？";pending=()=>{if(list.length>1){list.splice(cur,1);cur=0;render();}};show('confirmModal')}
function askDeleteVenue(v){confirmText.innerText="确认删除 "+v+"？";pending=()=>{let i=venues.indexOf(v);if(i>-1){venues.splice(i,1);list.forEach(s=>delete s.data[v]);render();}};show('confirmModal')}
function confirmAction(){hide('confirmModal');if(pending)pending();}
render();

function addRuleRow(){
  const tb=document.getElementById('ruleTable').getElementsByTagName('tbody')[0]||document.getElementById('ruleTable');
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input style="width:90%;font-size:8px"></td>
<td><input style="width:90%;font-size:8px"></td>
<td><input style="width:90%;font-size:8px"></td>
<td><input style="width:90%;font-size:8px"></td>
<td style="text-align:center"><span class="del" onclick="this.closest('tr').remove()">删除</span></td>`;
  tb.appendChild(tr);
}

document.getElementById('addBetRule').onclick=function(){
 const table=this.parentNode.previousElementSibling;
 const tr=document.createElement('tr');
 tr.innerHTML='<td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td style="text-align:center"><span class="del" onclick="this.closest(\'tr\').remove()">删除</span></td>';
 table.appendChild(tr);
};
document.getElementById('addLossRule').onclick=function(){
 const table=this.parentNode.previousElementSibling;
 const tr=document.createElement('tr');
 tr.innerHTML='<td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td><input style="width:90%;font-size:8px"></td><td style="text-align:center"><span class="del" onclick="this.closest(\'tr\').remove()">删除</span></td>';
 table.appendChild(tr);
};

</script>
</body></html>
